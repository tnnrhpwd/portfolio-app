[build]
command = "npm run build:netlify"
publish = "frontend/build"
image = "ubuntu:noble"

[build.environment]
NODE_VERSION = "22"
NPM_VERSION = "10"

# ── Plugins ─────────────────────────────────────────────────
[[plugins]]
package = "netlify-plugin-sitemap"

[plugins.inputs]
buildDir = "frontend/build"
prettyURLs = true
exclude = [
    "./admin",
    "./payment-success",
    "./reset-password",
    "./forgot-password",
]

# ── Deploy-preview context (PRs / branch deploys) ────────
[context.deploy-preview]
command = "npm run build:netlify"

[context.deploy-preview.environment]
NODE_ENV = "staging"

# ── Prerender hints for static pages (better SEO / FCP) ────
[[headers]]
for = "/about"
[headers.values]
X-Prerender = "1"
Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
for = "/privacy"
[headers.values]
X-Prerender = "1"
Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
for = "/terms"
[headers.values]
X-Prerender = "1"
Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
for = "/contact"
[headers.values]
X-Prerender = "1"
Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# ── Security headers (all pages) ──────────────────────────────
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://mern-plan-web-service.onrender.com https://*.stripe.com; frame-src https://*.stripe.com;"

# ── Immutable caching for hashed Vite assets ──────────────────
[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# ── Short cache for HTML (always revalidate) ──────────────────
[[headers]]
for = "/*.html"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

# ── Moderate cache for images / icons ─────────────────────────
[[headers]]
for = "/*.png"
[headers.values]
Cache-Control = "public, max-age=86400"

[[headers]]
for = "/*.ico"
[headers.values]
Cache-Control = "public, max-age=86400"

# ── Redirects ─────────────────────────────────────────────────
# Proxy API calls to the Render backend
[[redirects]]
from = "/api/*"
to = "https://mern-plan-web-service.onrender.com/api/:splat"
status = 200
force = true

# Legacy /LegalTerms stub → redirect to /terms
[[redirects]]
from = "/LegalTerms"
to = "/terms"
status = 301
force = true

# SPA catch-all (must be last)
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
