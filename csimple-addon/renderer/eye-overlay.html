<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Eye Overlay</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      pointer-events: none; /* paranoia — window is also click-through */
      cursor: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }

    /* The gaze dot — animated to smooth over inter-frame jumps */
    .gaze-dot {
      position: absolute;
      left: 0; top: 0;
      width: 28px;
      height: 28px;
      margin-left: -14px;
      margin-top: -14px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%,
        rgba(80, 220, 255, 0.95) 0%,
        rgba(80, 220, 255, 0.55) 35%,
        rgba(80, 220, 255, 0.0) 75%);
      box-shadow:
        0 0 12px rgba(80, 220, 255, 0.65),
        0 0 26px rgba(80, 220, 255, 0.35);
      transition: transform 60ms linear, opacity 200ms ease;
      will-change: transform, opacity;
      transform: translate3d(-200px, -200px, 0);
      opacity: 0;
    }
    .gaze-dot.visible { opacity: 1; }
    .gaze-dot.blink { opacity: 0.15; }

    /* Tiny inner pip for precise center */
    .gaze-dot::after {
      content: '';
      position: absolute;
      left: 50%; top: 50%;
      width: 6px;
      height: 6px;
      margin-left: -3px;
      margin-top: -3px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.9);
    }

    /* Brief flash when an implicit-calibration sample fires */
    .train-flash {
      position: absolute;
      left: 0; top: 0;
      width: 60px;
      height: 60px;
      margin-left: -30px;
      margin-top: -30px;
      border-radius: 50%;
      border: 2px solid rgba(120, 255, 160, 0.85);
      box-shadow: 0 0 20px rgba(120, 255, 160, 0.6);
      animation: train-pulse 700ms ease-out forwards;
      pointer-events: none;
    }
    @keyframes train-pulse {
      0%   { transform: scale(0.4); opacity: 1; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    /* HUD — shows live status in a corner. Subtle, semi-transparent. */
    .hud {
      position: absolute;
      left: 16px;
      bottom: 16px;
      padding: 8px 12px;
      background: rgba(10, 10, 18, 0.55);
      color: #cfe9ff;
      font-size: 11px;
      line-height: 1.4;
      border-radius: 8px;
      border: 1px solid rgba(80, 220, 255, 0.25);
      backdrop-filter: blur(6px);
      pointer-events: none;
      letter-spacing: 0.02em;
    }
    .hud .label { opacity: 0.65; margin-right: 4px; }
    .hud .num { color: #ffffff; font-variant-numeric: tabular-nums; }
    .hud .ok { color: #a3f5b6; }
    .hud .warn { color: #ffd07a; }
    .hud .err { color: #ff8c8c; }
    .hud .hint {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid rgba(80, 220, 255, 0.18);
      max-width: 320px;
      color: #cfe9ff;
    }
    /* Twin progress bars: cursor-still + gaze-still */
    .bar-row { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
    .bar-row .bar-label { width: 46px; opacity: 0.7; font-size: 10px; }
    .bar-row .bar-track {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      overflow: hidden;
    }
    .bar-row .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #50dcff, #a3f5b6);
      transition: width 80ms linear;
    }
    .bar-row .bar-fill.full { background: linear-gradient(90deg, #a3f5b6, #ffffff); }
    /* Cursor-target halo: shown when training is gated only by gaze sanity */
    .cursor-halo {
      position: absolute;
      left: 0; top: 0;
      width: 50px;
      height: 50px;
      margin-left: -25px;
      margin-top: -25px;
      border-radius: 50%;
      border: 2px dashed rgba(255, 208, 122, 0.7);
      transition: transform 60ms linear, opacity 200ms ease;
      pointer-events: none;
      opacity: 0;
      will-change: transform, opacity;
    }
    .cursor-halo.visible { opacity: 0.85; }
  </style>
</head>
<body>
  <div id="dot" class="gaze-dot"></div>
  <div id="cursorHalo" class="cursor-halo"></div>
  <div id="hud" class="hud">
    <div><span class="label">Eye Overlay</span> <span id="status" class="ok">starting…</span></div>
    <div><span class="label">gaze</span> <span id="gaze" class="num">—</span></div>
    <div><span class="label">samples</span> <span id="samples" class="num">0</span> · <span class="label">residual</span> <span id="residual" class="num">—</span></div>
    <div class="bar-row"><span class="bar-label">cursor</span><div class="bar-track"><div id="barCursor" class="bar-fill"></div></div></div>
    <div class="bar-row"><span class="bar-label">gaze</span><div class="bar-track"><div id="barGaze" class="bar-fill"></div></div></div>
    <div class="hint" id="hint">
      <b>Auto-calibration:</b> move the mouse to a new spot you're looking at,
      then hold both still for ~½ second. A green ring = sample captured.<br>
      <span style="opacity:0.7;">Hotkeys: <b>Ctrl+Shift+G</b> force-confirm · <b>Ctrl+Shift+U</b> undo last · <b>Ctrl+Shift+R</b> reset all online samples</span>
    </div>
  </div>

  <script>
    (function () {
      const dot = document.getElementById('dot');
      const halo = document.getElementById('cursorHalo');
      const elStatus = document.getElementById('status');
      const elGaze = document.getElementById('gaze');
      const elSamples = document.getElementById('samples');
      const elResidual = document.getElementById('residual');
      const elHint = document.getElementById('hint');
      const barCursor = document.getElementById('barCursor');
      const barGaze = document.getElementById('barGaze');

      // The overlay window covers the full virtual desktop. Gaze coordinates
      // arrive in *global* screen space, so we subtract the window origin to
      // translate into local CSS pixels.
      let originX = 0, originY = 0;
      let sampleCount = 0;

      window.overlayAPI.onInit((data) => {
        if (data && data.origin) {
          originX = data.origin.x || 0;
          originY = data.origin.y || 0;
        }
        elStatus.textContent = 'tracking';
      });

      window.overlayAPI.onGaze((data) => {
        if (typeof data.x !== 'number' || typeof data.y !== 'number') return;
        const lx = data.x - originX;
        const ly = data.y - originY;
        dot.style.transform = `translate3d(${lx}px, ${ly}px, 0)`;
        dot.classList.add('visible');
        if (data.blink) dot.classList.add('blink');
        else dot.classList.remove('blink');
        elGaze.textContent = `${Math.round(data.x)}, ${Math.round(data.y)}`;
      });

      window.overlayAPI.onTrainSample((data) => {
        sampleCount = data.count || (sampleCount + 1);
        elSamples.textContent = String(sampleCount);
        // Spawn a transient flash at the cursor target
        const flash = document.createElement('div');
        flash.className = 'train-flash';
        flash.style.transform = `translate3d(${data.x - originX}px, ${data.y - originY}px, 0)`;
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 800);
      });

      window.overlayAPI.onModelUpdated((info) => {
        if (info && typeof info.mean_residual_px === 'number') {
          elResidual.textContent = `${info.mean_residual_px.toFixed(1)}px`;
          elResidual.className = 'num ' + (info.mean_residual_px < 80 ? 'ok' : 'warn');
        }
        elStatus.textContent = `model: ${info.model || '?'} · adapting`;
      });

      // Live training-progress feedback. Updated every ~50ms while overlay is
      // active so the user can see the auto-calibration gates in real time.
      window.overlayAPI.onTrainStatus((s) => {
        if (!s) return;
        const cursorPct = Math.min(1, s.cursorStillMs / s.cursorStillTargetMs);
        const gazePct   = Math.min(1, s.gazeStillMs   / s.gazeStillTargetMs);
        barCursor.style.width = (cursorPct * 100).toFixed(0) + '%';
        barGaze.style.width   = (gazePct   * 100).toFixed(0) + '%';
        barCursor.classList.toggle('full', cursorPct >= 1);
        barGaze.classList.toggle('full', gazePct >= 1);

        // Show a dashed halo around the OS cursor so the user can SEE the
        // hold-still target. (The OS cursor itself isn't visible to us.)
        if (s.cursor) {
          const cx = s.cursor.x - originX;
          const cy = s.cursor.y - originY;
          halo.style.transform = `translate3d(${cx}px, ${cy}px, 0)`;
          halo.classList.add('visible');
        }

        // Contextual hint — tell the user what's blocking sample capture.
        let msg;
        if (s.cooldownRemaining > 50) {
          msg = `<b>Cooling down…</b> ${(s.cooldownRemaining/1000).toFixed(1)}s — then move the cursor to a new spot you're looking at.`;
        } else if (!s.movedRecently) {
          msg = `<b>Move the cursor</b> to a new spot you're looking at — a parked cursor won't capture samples.`;
        } else if (!s.inSanity) {
          msg = `<b>Look at the cursor.</b> Gaze is ${Math.round(s.dist)}px from cursor (need <${Math.round(s.sanityMaxDist)}px). Wrong-target samples are rejected.`;
        } else if (cursorPct < 1) {
          msg = `<b>Hold the cursor still…</b> ${Math.round(s.cursorStillMs)}ms / ${s.cursorStillTargetMs}ms.`;
        } else if (gazePct < 1) {
          msg = `<b>Hold your gaze still…</b> ${Math.round(s.gazeStillMs)}ms / ${s.gazeStillTargetMs}ms.`;
        } else {
          msg = `<b>Capturing…</b>`;
        }
        elHint.innerHTML = msg;
      });
    })();
  </script>
</body>
</html>
